# ─────────────────────────────────────────────────────────────────────────────
# EAS OTA Update — Hadir.AI
#
# Deploys JavaScript/asset changes to live users without a store submission.
#
# Branch → Channel mapping:
#   master       →  preview   (internal testing / QA)
#   production   →  production (live App Store + Play Store users)
#
# Required GitHub secret:
#   EXPO_TOKEN  — personal access token from expo.dev/accounts/[user]/settings/access-tokens
#
# When NOT to rely on this workflow (requires a full EAS build instead):
#   - New native dependencies added (npm install <native-package>)
#   - Changes to android/ or ios/ native code
#   - app.json plugin changes that generate native code
#   - Expo SDK version bumps
#   - Changes to app permissions or entitlements
# ─────────────────────────────────────────────────────────────────────────────

name: EAS OTA Update

on:
  push:
    branches:
      - master        # → preview channel  (staging / QA)
      - production    # → production channel (live users)
    paths:
      # Only trigger when mobile JS/assets change — not backend services
      - 'apps/mobile/**'
      # Never trigger on native directories (those need a full build)
      - '!apps/mobile/android/**'
      - '!apps/mobile/ios/**'
      - '!apps/mobile/.expo/**'
      - '!apps/mobile/node_modules/**'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS Update channel to deploy to'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      message:
        description: 'Update message (shown in EAS dashboard)'
        required: false
        default: 'Manual deployment'

jobs:
  ota-update:
    name: Deploy OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      # ── 3. Install JS dependencies ──────────────────────────────────────────
      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      # ── 4. Authenticate with Expo / EAS ─────────────────────────────────────
      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── 5a. Deploy to PREVIEW (master branch) ───────────────────────────────
      - name: Deploy OTA → preview channel
        if: github.ref == 'refs/heads/master'
        working-directory: apps/mobile
        run: |
          eas update \
            --branch preview \
            --message "preview: ${{ github.sha }} — ${{ github.event.head_commit.message }}" \
            --non-interactive

      # ── 5b. Deploy to PRODUCTION (production branch) ────────────────────────
      - name: Deploy OTA → production channel
        if: github.ref == 'refs/heads/production'
        working-directory: apps/mobile
        run: |
          eas update \
            --branch production \
            --message "production: ${{ github.sha }} — ${{ github.event.head_commit.message }}" \
            --non-interactive

      # ── 5c. Manual dispatch ──────────────────────────────────────────────────
      - name: Deploy OTA → manual dispatch channel
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/mobile
        run: |
          eas update \
            --branch ${{ github.event.inputs.channel }} \
            --message "${{ github.event.inputs.message }} (${{ github.sha }})" \
            --non-interactive

      # ── 6. Summary ──────────────────────────────────────────────────────────
      - name: Print deployment summary
        if: success()
        run: |
          echo "✅ OTA update deployed successfully"
          echo "Commit : ${{ github.sha }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
